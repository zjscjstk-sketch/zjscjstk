<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사칙연산 계산기</title>
    <script src="calculator.js"></script>
</head>
<body>
    <h1>콘솔창 계산기 프로그램</h1>
    <hr>
    <h3>Window OS의 경우</h3>
    <p>1. <strong>F12</strong> 키를 눌러 콘솔 창을 여세요.</p>
    <p>2. <code>start()</code>를 콘솔창에 입력하여 계산기를 실행합니다.</p>
    
    <h3>Mac OS의 경우</h3>
    <p>1. <strong>Option + Command + i</strong> 키를 눌러 콘솔 창을 여세요.</p>
    <p>2. <code>start()</code>를 콘솔창에 입력하여 계산기를 실행합니다.</p>
</body>
</html>
